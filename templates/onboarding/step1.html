<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שלב 1 מתוך 5 · בריא.ה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--cream:#fff0db;--brown:#634734;--olive:#a3a877;
--terracotta:#a3502e;--terracotta-hover:#823d22;
--sage:#cbc6a9;--clay-100:#e8c9b3;
--brown-100:#b89a83;--brown-200:#8c6b54;--cream-50:#fffaf0;
--font-display:"Frank Ruhl Libre",Georgia,serif;
--font-body:"Assistant","Heebo",sans-serif;
}
html{background:var(--cream)}
body{font-family:var(--font-body);font-size:16px;color:var(--brown);-webkit-font-smoothing:antialiased;
  background:linear-gradient(135deg,#cbc6a9 0%,#fff0db 60%);min-height:100vh;padding:2rem 1rem;}
h3{font-family:var(--font-display);font-weight:400}
.btn{font-family:var(--font-body);font-size:15px;font-weight:500;padding:12px 28px;border-radius:999px;cursor:pointer;border:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.btn-primary{background:var(--terracotta);color:var(--cream)}
.btn-primary:hover{background:var(--terracotta-hover)}
.btn-full{width:100%}
.field-group{margin-bottom:1.25rem}
.field-label{display:block;font-size:13px;font-weight:600;color:var(--brown-200);margin-bottom:6px}
input[type=text],input[type=number],textarea{
  width:100%;padding:12px 16px;border:1px solid rgba(99,71,52,.2);border-radius:18px;
  background:var(--cream-50);color:var(--brown);font-family:var(--font-body);font-size:15px;outline:none;
}
input:focus,textarea:focus{border-color:rgba(163,80,46,.5);box-shadow:0 0 0 3px rgba(163,80,46,.08)}
textarea{resize:vertical}
.progress-wrap{background:rgba(99,71,52,.1);border-radius:999px;height:4px;overflow:hidden}
.progress-bar{height:100%;background:var(--terracotta);transition:width .3s}

.step-header{margin-bottom:1.5rem;max-width:580px;margin-inline:auto}
.step-label{font-size:12px;color:#b89a83;margin-bottom:6px}
.onboarding-card{
  max-width:580px;margin:0 auto;background:#fffaf0;border-radius:28px;
  padding:2rem 2rem 2.5rem;box-shadow:0 6px 18px -8px rgba(99,71,52,.18);
}
.step-emoji{font-size:2rem;margin-bottom:12px;display:block}
.step-title{font-family:"Frank Ruhl Libre",Georgia,serif;font-size:1.6rem;font-weight:400;color:#634734;margin-bottom:6px}
.step-desc{font-size:14px;color:#8c6b54;margin-bottom:1.5rem}
</style>
</head>
<body>

<div class="step-header">
  <div class="step-label">שלב 1 מתוך 5 · על עצמך</div>
  <div class="progress-wrap">
    <div class="progress-bar" style="width:20%;"></div>
  </div>
</div>

<div class="onboarding-card">
  <div class="step-emoji">🌿</div>
  <h3 class="step-title">קצת עלייך</h3>
  <p class="step-desc">כמה דברים בסיסיים שיעזרו לנו להכיר אותך</p>

  <form method="POST" action="/onboarding/step/1/{{ token }}">

    <div class="field-group">
      <label class="field-label">שם מלא</label>
      <input type="text" name="full_name" value="{{ lakoach.full_name }}" required>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="field-group">
        <label class="field-label">גיל</label>
        <input type="number" name="age" min="18" max="99" placeholder="35">
      </div>
      <div class="field-group">
        <label class="field-label">מקום מגורים</label>
        <input type="text" name="city" placeholder="תל אביב">
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">ספרי לנו קצת עלייך 🤍</label>
      <p style="font-size:13px; color:#8c6b54; margin-bottom:8px;">
        מי את? מה ממלא את חייך? מה אוהבת?
      </p>
      <textarea name="about_me" rows="5"
                placeholder="כתבי כמה שנוח לך — אין מינימום ואין מקסימום..."></textarea>
    </div>

    <button type="submit" class="btn btn-primary btn-full">
      המשך → <span style="font-size:12px; opacity:.7;">מה הביא אותך לבריאה</span>
    </button>
  </form>
</div>
</body>
</html>
